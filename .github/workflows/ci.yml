name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name == 'pull_request' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify version sync
        run: |
          npm run version:sync
          git diff --exit-code -- package.json package-lock.json public/manifest.json src/lib/version.ts

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build
